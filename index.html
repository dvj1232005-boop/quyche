<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Quy Chế & Đền Đô</title>

<meta name="theme-color" content="#0b3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AnQuyChe">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#7f1d1d,#064e3b);
  min-height:100vh;
}
.hidden{display:none}

.container{max-width:420px;margin:auto;padding:20px}
.card{
  background:white;
  border-radius:22px;
  padding:20px;
  box-shadow:0 25px 50px rgba(0,0,0,.25);
}
h2{margin:0 0 6px}
.sub{font-size:13px;color:#555}

input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:#b91c1c;
  color:white;
  font-weight:600;
  margin-top:14px;
}
button.secondary{background:#334155}
.day{font-weight:700;margin-top:14px}

.section{margin-top:18px}
.shiftBox{
  background:#f1f5f9;
  border-radius:14px;
  padding:10px;
  margin:8px 0;
}
.badge{
  display:inline-block;
  background:#14532d;
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
  margin:4px 4px 0 0;
}

.countdown{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#ecfdf5;
  text-align:center;
  border:2px solid #10b981;
}
.countdown.warn{background:#fff7ed;border-color:#f97316}
.countdown.danger{background:#fef2f2;border-color:#dc2626}

footer{text-align:center;margin-top:16px;font-size:12px;color:#eee}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.popupContent{
  background:white;
  padding:20px;
  border-radius:20px;
  width:85%;
  max-width:320px;
  text-align:center;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9)}
  to{opacity:1; transform:scale(1)}
}
</style>
</head>

<body>

<div class="container" id="app">
  <div class="card">
    <h2>Đăng ký ca làm</h2>
    <div class="sub">Tuần hiện tại • An Quy Chế</div>
    <div id="lockStatus" class="sub"></div>

    <div id="countdownCard" class="countdown">
      <div class="cd-label">⏳ Thời gian còn lại để đăng ký</div>
      <div id="countdownTime">-- : -- : -- : --</div>
    </div>

    <input id="name" placeholder="Nhập tên nhân viên">

    <select id="store">
      <option value="">Chọn cơ sở làm việc</option>
      <option value="QuyChe">Quy Chế</option>
      <option value="DenDo">Đền Đô</option>
    </select>

    <div id="form"></div>

    <button id="submitBtn">Xác nhận đăng ký</button>
    <button id="managerBtn" class="secondary">🔐 Quản lý</button>
  </div>

  <div class="card section hidden" id="managerBox">
    <h2>Tổng hợp đăng ký ca làm</h2>

    <input id="pin" type="password" placeholder="Nhập mã PIN quản lý">
    <button id="loginManager">Đăng nhập quản lý</button>

    <div id="summary"></div>
    <div id="excelTable"></div>

    <button id="unlockBtn" class="secondary">🔓 Mở đăng ký</button>
    <button id="lockBtn" class="secondary">🔒 Khóa đăng ký</button>

    <button id="clearBtn" class="secondary">
      Xóa toàn bộ lịch tuần này
    </button>
  </div>

  <footer>© 2026 An Quy Chế • Developed by Đào Đăng Tùng</footer>
</div>

<div id="thankPopup" class="popup">
  <div class="popupContent">
    <h3>💖 Cảm ơn bạn </h3>
    <p>Cảm ơn bạn vì một tuần làm việc đầy năng lượng và trách nhiệm, rất đáng khen!</p>
    <button id="closeBtn">Thank you baeeeee</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, get, remove }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCK6yfVr9VBMGwhbvYMXkJqMoRjo4Om2LM",
  databaseURL:"https://an-quy-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

const DAYS=["T2","T3","T4","T5","T6","T7","CN"];
const SHIFTS=["C1","C2","C3","F1","F2","2C(C1+C2)","2C(C2+C3)"];

/* 🔥 FIX */
let manualLock = null;

async function loadLock(){
  const snap = await get(ref(db,"settings/lock"));
  manualLock = snap.exists() ? snap.val() : null;
}

function isRegistrationLocked(){

  if(manualLock === true) return true;
  if(manualLock === false) return false;

  const n=new Date();
  const d=n.getDay(), h=n.getHours(), m=n.getMinutes();

  if(d===5 && (h>20 || (h===20 && m>=0))) return true;
  if(d===6 || d===0) return true;

  return false;
}

/* STATUS */
const lockStatus=document.getElementById("lockStatus");

async function updateStatus(){
  await loadLock();

  lockStatus.style.fontWeight="600";

  if(manualLock === true){
    lockStatus.textContent="⛔ Bị quản lý khóa";
    lockStatus.style.color="#dc2626";
    return;
  }

  if(manualLock === false){
    lockStatus.textContent="🟢 Đang mở (quản lý)";
    lockStatus.style.color="#16a34a";
    return;
  }

  if(isRegistrationLocked()){
    lockStatus.textContent="⛔ Đang khóa đăng ký • Mở lại Thứ 2";
    lockStatus.style.color="#b91c1c";
  }else{
    lockStatus.textContent="✅ Đang mở đăng ký • Khóa lúc 20:00 Thứ 6";
    lockStatus.style.color="#14532d";
  }
}
updateStatus();

/* COUNTDOWN */
const cdCard=document.getElementById("countdownCard");
const cdTime=document.getElementById("countdownTime");
const submitBtn=document.getElementById("submitBtn");

function getLockTime(){
  const now=new Date();
  const lock=new Date(now);
  const diff=5-now.getDay();
  lock.setDate(now.getDate()+diff);
  lock.setHours(20,0,0,0);
  return lock;
}
const lockTime=getLockTime();

async function updateCountdown(){
  await loadLock();

  const now=new Date();
  const diff=lockTime-now;

  if(diff<=0){

    if(manualLock === false){
      cdTime.innerText="ĐANG MỞ (quản lý)";
      cdCard.className="countdown";
      submitBtn.disabled=false;
      return;
    }

    cdTime.innerText="ĐÃ KHÓA";
    cdCard.className="countdown danger";
    submitBtn.disabled=true;
    return;
  }

  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor(diff/(1000*60*60))%24;
  const m=Math.floor(diff/(1000*60))%60;
  const s=Math.floor(diff/1000)%60;

  cdTime.innerText=
    `${d} : ${h.toString().padStart(2,"0")} : ${m.toString().padStart(2,"0")} : ${s.toString().padStart(2,"0")}`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* FORM */
const form=document.getElementById("form");
DAYS.forEach(d=>{
  form.innerHTML+=`
    <div class="day">${d}</div>
    <select id="${d}">
      <option value="">Không đăng ký</option>
      ${SHIFTS.map(s=>`<option>${s}</option>`).join("")}
    </select>
  `;
});

/* SUBMIT giữ nguyên */
document.getElementById("submitBtn").onclick=async()=>{
  await loadLock();

  const ten=document.getElementById("name").value.trim();
  const store=document.getElementById("store").value;

  if(!ten) return alert("Vui lòng nhập tên");
  if(!store) return alert("Vui lòng chọn cơ sở");

  if(isRegistrationLocked())
    return alert("⛔ Đã khóa đăng ký");

  const lich={};
  DAYS.forEach(d=>{
    const v=document.getElementById(d).value;
    if(v) lich[d]=v;
  });

  if(!Object.keys(lich).length)
    return alert("Bạn chưa đăng ký ca nào");

  await set(ref(db,"dangKy/"+store+"/"+ten),{lich,store});
  alert("Đã gửi đăng ký ca làm");
};

/* MANAGER giữ nguyên */
document.getElementById("managerBtn").onclick=()=>{
  document.getElementById("managerBox").classList.remove("hidden");
};

document.getElementById("loginManager").onclick=async()=>{
  if(document.getElementById("pin").value!=="2005")
    return alert("Mã PIN không đúng");

  const summary=document.getElementById("summary");
  const excel=document.getElementById("excelTable");

  summary.innerHTML="";
  excel.innerHTML="";

  const snap=await get(ref(db,"dangKy"));
  if(!snap.exists()){
    summary.innerHTML="<p>Chưa có dữ liệu đăng ký</p>";
    return;
  }

  const data = snap.val();

  ["QuyChe","DenDo"].forEach(store => {

    if(!data[store]) return;

    summary.innerHTML += `
      <div style="
        margin-top:20px;
        padding:12px;
        border-radius:16px;
        background:#f8fafc;
        border:2px solid ${store==="QuyChe"?"#16a34a":"#2563eb"};
      ">
        <h3>🏪 ${store==="QuyChe"?"Quy Chế":"Đền Đô"}</h3>
        <div id="box-${store}"></div>
      </div>
    `;

    const box = document.getElementById(`box-${store}`);
    const sum={};

    Object.entries(data[store]).forEach(([ten,obj])=>{
      const lich=obj.lich||{};
      Object.entries(lich).forEach(([d,c])=>{
        sum[d]??={};
        sum[d][c]??=[];
        sum[d][c].push(ten);
      });
    });

    DAYS.forEach(day=>{
      if(!sum[day]) return;
      box.innerHTML += `<div class="day">${day}</div>`;

      SHIFTS.forEach(shift=>{
        if(!sum[day][shift]) return;
        box.innerHTML += `
          <div class="shiftBox">
            <b>${shift}</b><br>
            ${sum[day][shift].map(n=>`<span class="badge">${n}</span>`).join("")}
          </div>
        `;
      });
    });

  });

  renderExcelTable(data);
};

/* 🔓 🔒 giữ nguyên */
document.getElementById("unlockBtn").onclick=async()=>{
  await set(ref(db,"settings/lock"),false);
  alert("Đã mở đăng ký");
  location.reload();
};

document.getElementById("lockBtn").onclick=async()=>{
  await set(ref(db,"settings/lock"),true);
  alert("Đã khóa đăng ký");
  location.reload();
};

/* EXCEL FIX TÊN */
function renderExcelTable(data){
  const container=document.getElementById("excelTable");
  const DAYS=["T2","T3","T4","T5","T6","T7","CN"];

  ["QuyChe","DenDo"].forEach(store=>{

    if(!data[store]) return;

    let html=`
    <div style="margin-top:30px">
      <h2 style="color:${store==="QuyChe"?"#16a34a":"#2563eb"}">
        📊 ${store==="QuyChe"?"Quy Chế":"Đền Đô"} - Bảng phân ca
      </h2>

      <div style="overflow:auto">
      <table style="border-collapse:collapse;min-width:1400px;width:100%">
        <tr>
    `;

    DAYS.forEach(day=>{
      html+=`<th colspan="4" style="background:#fde047;border:1px solid #999">${day}</th>`;
    });

    html+="</tr><tr>";

    DAYS.forEach(()=>{
      html+=`
        <th style="border:1px solid #999">Buổi</th>
        <th style="border:1px solid #999">Tên</th>
        <th style="border:1px solid #999">Ca</th>
        <th style="border:1px solid #999">Công việc</th>
      `;
    });

    html+="</tr>";

    const structured={};

    Object.entries(data[store]).forEach(([ten,obj])=>{
      const lich=obj.lich||{};
      Object.entries(lich).forEach(([day,shift])=>{
        structured[day]??={Sáng:[],Chiều:[],Tối:[]};

        if(shift==="C1") structured[day].Sáng.push(ten);
        else if(shift==="C2") structured[day].Chiều.push(ten);
        else if(shift==="C3") structured[day].Tối.push(ten);
        else if(shift==="2C(C1+C2)"){
          structured[day].Sáng.push(ten);
          structured[day].Chiều.push(ten);
        }
        else if(shift==="2C(C2+C3)"){
          structured[day].Chiều.push(ten);
          structured[day].Tối.push(ten);
        }
        else if(shift==="F1"){
          structured[day].Sáng.push(ten);
          structured[day].Chiều.push(ten);
        }
        else if(shift==="F2"){
          structured[day].Chiều.push(ten);
          structured[day].Tối.push(ten);
        }
      });
    });

    ["Sáng","Chiều","Tối"].forEach(session=>{
      html+="<tr>";

      DAYS.forEach(day=>{
        const list=structured[day]?.[session]||[];

        html+=`
        <td style="border:1px solid #ccc;background:#f1f5f9">${session}</td>
        <td style="border:1px solid #ccc">
          ${list.map(n=>{
            const arr=n.split(" ");
            const mid=Math.ceil(arr.length/2);
            return `
              <div style="padding:4px 0;border-bottom:1px dashed #ccc;line-height:1.3">
                ${arr.slice(0,mid).join(" ")}<br>
                ${arr.slice(mid).join(" ")}
              </div>
            `;
          }).join("")}
        </td>
        <td style="border:1px solid #ccc">
          ${session==="Sáng"?"C1":session==="Chiều"?"C2":"C3"}
        </td>
        <td style="border:1px solid #ccc">
          ${session==="Sáng"?"Thu ngân / Pha chế":
            session==="Chiều"?"Pha chế / Phục vụ":
            "Phục vụ"}
        </td>
        `;
      });

      html+="</tr>";
    });

    html+="</table></div></div>";

    container.innerHTML+=html;
  });
}

/* CLEAR giữ nguyên */
document.getElementById("clearBtn").onclick=async()=>{
  if(confirm("Xóa toàn bộ đăng ký tuần này?")){
    await remove(ref(db,"dangKy"));
    location.reload();
  }
};

/* POPUP giữ nguyên */
const popup=document.getElementById("thankPopup");
const closeBtn=document.getElementById("closeBtn");
closeBtn.onclick=()=>popup.style.display="none";
window.onload=()=>popup.style.display="flex";
</script>

</body>
</html>
