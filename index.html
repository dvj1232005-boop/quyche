<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>An Quy Chế – Đăng ký ca làm</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#7f1d1d,#064e3b);
  min-height:100vh;
}
.hidden{display:none}

/* LAYOUT */
.container{max-width:420px;margin:auto;padding:20px}

/* CARD */
.card{
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:20px;
  box-shadow:0 25px 60px rgba(0,0,0,.3);
  margin-bottom:16px;
}

h2{margin:0 0 6px}
.sub{font-size:13px;color:#555}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  border:none;
  background:#f1f5f9;
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  background:#b91c1c;
  color:white;
  font-weight:600;
  margin-top:12px;
  cursor:pointer;
}
button.secondary{background:#334155}

/* DAY */
.day{font-weight:700;margin-top:16px;color:#065f46}

/* SHIFT BUTTON */
.shift-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.shift-btn{
  padding:8px 12px;
  border-radius:999px;
  border:none;
  background:#e2e8f0;
  cursor:pointer;
}
.shift-btn.active{
  background:#10b981;
  color:white;
}
.shift-btn.suggest{
  outline:2px solid #22c55e;
}

/* COUNTDOWN */
.countdown{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#065f46;
  color:white;
  text-align:center;
}
.cd-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.cd-grid div{
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
}

/* DASHBOARD */
.stat-box{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-radius:10px;
  margin:5px 0;
}
.stat-low{background:#dcfce7}
.stat-mid{background:#fef9c3}
.stat-high{background:#fee2e2}

/* BADGE */
.badge{
  display:inline-block;
  background:#065f46;
  color:white;
  padding:5px 10px;
  border-radius:999px;
  margin:3px;
  font-size:12px;
}

.shiftBox{
  background:#f1f5f9;
  padding:10px;
  border-radius:12px;
  margin:6px 0;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
}
.popupContent{
  background:white;
  padding:20px;
  border-radius:20px;
  width:85%;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Đăng ký ca làm</h2>
<div id="lockStatus"></div>

<div class="countdown">
<div class="cd-grid">
<div><span id="d"></span><br>Ngày</div>
<div><span id="h"></span><br>Giờ</div>
<div><span id="m"></span><br>Phút</div>
<div><span id="s"></span><br>Giây</div>
</div>
</div>

<div id="dashboard"></div>
<div id="who"></div>

<input id="name" placeholder="Nhập tên">

<div id="form"></div>

<button id="submitBtn">Xác nhận đăng ký</button>
<button id="managerBtn" class="secondary">🔐 Quản lý</button>
</div>

<div class="card hidden" id="managerBox">
<input id="pin" type="password" placeholder="PIN">
<button id="loginManager">Đăng nhập</button>
<div id="summary"></div>
<button id="clearBtn" class="secondary">Xóa</button>
</div>

</div>

<div id="thankPopup" class="popup">
<div class="popupContent">
<h3>💖 Tri ân</h3>
<p>Cảm ơn bạn!</p>
<button id="closeBtn">Đóng</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, get, remove }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyCK6yfVr9VBMGwhbvYMXkJqMoRjo4Om2LM",
  databaseURL:"https://an-quy-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

/* DATA */
const DAYS=["T2","T3","T4","T5","T6","T7","CN"];
const SHIFTS=["C1","C2","C3","F1","F2","2C(C1+C2)","2C(C2+C3)"];

/* LOCK */
function isRegistrationLocked(){
  const n=new Date();
  const d=n.getDay(), h=n.getHours(), m=n.getMinutes();
  if(d===5 && (h>20 || (h===20 && m>=0))) return true;
  if(d===6 || d===0) return true;
  return false;
}

/* STATUS */
lockStatus.innerText=isRegistrationLocked()?"⛔ Đang khóa":"✅ Đang mở";

/* COUNTDOWN */
function getLockTime(){
  const now=new Date();
  const lock=new Date(now);
  lock.setDate(now.getDate()+(5-now.getDay()));
  lock.setHours(20,0,0,0);
  return lock;
}
const lockTime=getLockTime();

function updateCountdown(){
  const diff=lockTime-new Date();
  document.getElementById("d").innerText=Math.floor(diff/86400000);
  document.getElementById("h").innerText=Math.floor(diff/3600000)%24;
  document.getElementById("m").innerText=Math.floor(diff/60000)%60;
  document.getElementById("s").innerText=Math.floor(diff/1000)%60;
}
setInterval(updateCountdown,1000);

/* FORM */
const form=document.getElementById("form");
const selected=JSON.parse(localStorage.getItem("lich")||"{}");

DAYS.forEach(d=>{
 form.innerHTML+=`<div class="day">${d}</div>
 <div class="shift-group" id="g-${d}">
 ${SHIFTS.map(s=>`<button class="shift-btn" data-d="${d}" data-s="${s}">${s}</button>`).join("")}
 </div>`;
});

/* CLICK */
document.addEventListener("click",e=>{
 if(e.target.classList.contains("shift-btn")){
  const d=e.target.dataset.d;
  document.querySelectorAll(`#g-${d} .shift-btn`).forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  selected[d]=e.target.dataset.s;
  localStorage.setItem("lich",JSON.stringify(selected));
 }
});

/* SUBMIT */
let isSubmitting=false;

submitBtn.onclick=async()=>{
 if(isSubmitting)return;
 isSubmitting=true;

 const ten=name.value.trim();
 if(!ten){alert("Nhập tên");isSubmitting=false;return;}

 if(isRegistrationLocked()){
   alert("Đã khóa");isSubmitting=false;return;
 }

 if(!Object.keys(selected).length){
   alert("Chưa chọn ca");isSubmitting=false;return;
 }

 await set(ref(db,"dangKy/"+ten),{lich:selected});
 alert("Đã gửi");
 isSubmitting=false;
};

/* DASHBOARD */
async function render(){
 const snap=await get(ref(db,"dangKy"));
 if(!snap.exists())return;

 let count={},people={};

 snap.forEach(n=>{
  const ten=n.key;
  const lich=n.val().lich||{};
  Object.entries(lich).forEach(([d,c])=>{
   count[c]=(count[c]||0)+1;
   (people[c]=people[c]||[]).push(ten);
  });
 });

 dashboard.innerHTML="<h3>📊 Ca</h3>";
 who.innerHTML="<h3>👤</h3>";

 SHIFTS.forEach(s=>{
  const num=count[s]||0;

  let cls="stat-low";
  if(num>=4) cls="stat-high";
  else if(num>=2) cls="stat-mid";

  dashboard.innerHTML+=`<div class="stat-box ${cls}">
  ${s} <b>${num}</b></div>`;

  if(num<=1){
    document.querySelectorAll(`[data-s='${s}']`).forEach(b=>b.classList.add("suggest"));
  }

  if(people[s]){
    who.innerHTML+=`<div class="shiftBox"><b>${s}</b><br>
    ${people[s].map(x=>`<span class="badge">${x}</span>`).join("")}
    </div>`;
  }
 });
}

/* AUTO REFRESH */
render();
setInterval(render,5000);

/* MANAGER */
managerBtn.onclick=()=>managerBox.classList.remove("hidden");

loginManager.onclick=async()=>{
 if(pin.value!=="2005")return alert("Sai PIN");

 summary.innerHTML="";
 const snap=await get(ref(db,"dangKy"));

 snap.forEach(n=>{
  summary.innerHTML+=`<div>${n.key}</div>`;
 });
};

/* CLEAR */
clearBtn.onclick=async()=>{
 if(confirm("Xóa hết?")){
  await remove(ref(db,"dangKy"));
  location.reload();
 }
};

/* POPUP */
closeBtn.onclick=()=>thankPopup.style.display="none";
window.onload=()=>thankPopup.style.display="flex";

</script>

</body>
</html>
