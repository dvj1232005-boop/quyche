<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>An Quy Chế – Đăng ký ca làm</title>

<meta name="theme-color" content="#0b3d2e">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#7f1d1d,#064e3b);
  min-height:100vh;
}

/* LAYOUT */
.container{max-width:420px;margin:auto;padding:20px}
.card{
  background:rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
}
h2{margin:0 0 6px}
.sub{font-size:13px;color:#555}

/* FORM */
input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  background:#f1f5f9;
  font-size:16px;
}
input:focus,select:focus{
  outline:none;
  box-shadow:0 0 0 2px #10b981;
  background:white;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  color:white;
  font-weight:600;
  margin-top:14px;
  transition:.2s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

#submitBtn{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
}
#managerBtn{
  background:linear-gradient(135deg,#1e293b,#334155);
}

.day{
  font-weight:700;
  margin-top:16px;
  color:#065f46;
}

/* COUNTDOWN MỚI */
.countdown.modern{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  text-align:center;
  background:linear-gradient(135deg,#065f46,#10b981);
  color:white;
}
.cd-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}
.cd-grid div{
  background:rgba(255,255,255,0.15);
  padding:12px;
  border-radius:14px;
}
.cd-grid span{
  font-size:22px;
  font-weight:700;
}
.cd-grid small{
  font-size:11px;
  opacity:0.8;
}

/* MANAGER */
.section{margin-top:18px}
.shiftBox{
  background:#f1f5f9;
  border-radius:14px;
  padding:10px;
  margin:8px 0;
}
.badge{
  display:inline-block;
  background:#14532d;
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
  margin:4px 4px 0 0;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
}
.popupContent{
  background:white;
  padding:20px;
  border-radius:20px;
  width:85%;
  max-width:320px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Đăng ký ca làm</h2>
    <div class="sub">Tuần hiện tại • An Quy Chế</div>
    <div id="lockStatus" class="sub"></div>

    <!-- COUNTDOWN NEW -->
    <div id="countdownCard" class="countdown modern">
      <div>⏳ Thời gian còn lại</div>
      <div class="cd-grid">
        <div><span id="d">0</span><small>Ngày</small></div>
        <div><span id="h">00</span><small>Giờ</small></div>
        <div><span id="m">00</span><small>Phút</small></div>
        <div><span id="s">00</span><small>Giây</small></div>
      </div>
    </div>

    <input id="name" placeholder="Nhập tên nhân viên">
    <div id="form"></div>

    <button id="submitBtn">Xác nhận đăng ký</button>
    <button id="managerBtn">🔐 Quản lý</button>
  </div>

  <div class="card section hidden" id="managerBox">
    <h2>Tổng hợp đăng ký</h2>
    <input id="pin" type="password" placeholder="Nhập PIN">
    <button id="loginManager">Đăng nhập</button>
    <div id="summary"></div>
    <button id="clearBtn">Xóa toàn bộ</button>
  </div>
</div>

<!-- POPUP -->
<div id="thankPopup" class="popup">
  <div class="popupContent">
    <h3>💖 Tri ân nhân viên</h3>
    <p>Chúc anh thành công và hạnh phúc trên chặng đường mới!</p>
    <button id="closeBtn">Đóng</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, get, remove }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCK6yfVr9VBMGwhbvYMXkJqMoRjo4Om2LM",
  databaseURL:"https://an-quy-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

const DAYS=["T2","T3","T4","T5","T6","T7","CN"];
const SHIFTS=["C1","C2","C3","F1","F2","2C(C1+C2)","2C(C2+C3)"];

/* COUNTDOWN FIX */
function getLockTime(){
  const now=new Date();
  const lock=new Date(now);
  const diff=5-now.getDay();
  lock.setDate(now.getDate()+diff);
  lock.setHours(20,0,0,0);
  return lock;
}
const lockTime=getLockTime();

function updateCountdown(){
  const now=new Date();
  const diff=lockTime-now;

  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor(diff/(1000*60*60))%24;
  const m=Math.floor(diff/(1000*60))%60;
  const s=Math.floor(diff/1000)%60;

  document.getElementById("d").innerText=d;
  document.getElementById("h").innerText=h.toString().padStart(2,"0");
  document.getElementById("m").innerText=m.toString().padStart(2,"0");
  document.getElementById("s").innerText=s.toString().padStart(2,"0");
}
setInterval(updateCountdown,1000);
updateCountdown();

/* FORM GIỮ NGUYÊN */
const form=document.getElementById("form");
DAYS.forEach(d=>{
  form.innerHTML+=`
    <div class="day">${d}</div>
    <select id="${d}">
      <option value="">Không đăng ký</option>
      ${SHIFTS.map(s=>`<option>${s}</option>`).join("")}
    </select>
  `;
});
</script>

</body>
</html>
